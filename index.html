<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        form {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
        }

        input,
        textarea,
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: #007BFF;
            color: #fff;
            border: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            display: block;
            overflow-x: auto;
            margin-top: 18px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
            white-space: nowrap;
        }

        th {
            background: #007BFF;
            color: #fff;
        }

        .send-btn {
            background: green;
            color: #fff;
            border: none;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn {
            background: #e53935;
            color: #fff;
            border: none;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 6px;
            display: block;
        }

        .small-btn {
            width: auto;
            display: inline-block;
            padding: 6px 10px;
        }

        @media (max-width:600px) {

            input,
            textarea,
            button {
                font-size: 14px;
                padding: 8px
            }

            th,
            td {
                font-size: 12px;
                padding: 6px
            }
        }
    </style>
</head>

<body>

    <h2>Data Entry Form</h2>
    <form id="dataForm" onsubmit="return false;">
        <label>Sr. No.:</label>
        <input type="text" id="srNo" readonly>

        <label>Date:</label>
        <input type="date" id="dateInput" required>

        <label>Name:</label>
        <input type="text" id="nameInput" placeholder="Enter Your Name..." required>

        <label>Phone Number:</label>
        <input type="tel" id="phoneInput" placeholder="+91 9876543210" required>

        <label>Product:</label>
        <input type="text" id="productInput" placeholder="Enter Your Product..." required>

        <label>Company of Product:</label>
        <input type="text" id="cmp" placeholder="Enter Company..." required>

        <label>Model Number:</label>
        <input type="text" id="mn" placeholder="Enter Model.No..." required>

        <label for="description">Description:</label>
        <textarea id="fip" name="description" rows="3" placeholder="Write your description here..."></textarea>

        <div style="display:flex; gap:10px;">
            <button type="button" id="addBtn">Add Entry</button>
            <button type="button" id="updateBtn" style="display:none;background:#28a745;">Update Entry</button>
            <button type="button" id="cancelBtn" style="display:none;background:#6c757d;">Cancel Edit</button>
        </div>
    </form>

    <h3>Entries</h3>
    <div style="width:100%; overflow-x:auto; max-width:1000px;">
        <table>
            <thead>
                <tr>
                    <th>Sr. No.</th>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Product</th>
                    <th>Company</th>
                    <th>Model</th>
                    <th>Fault</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            let storedData = JSON.parse(localStorage.getItem('myData')) || [];
            let editId = null;

            const srNoInput = document.getElementById('srNo');
            const dateInput = document.getElementById('dateInput');
            const form = document.getElementById('dataForm');
            const tableBody = document.getElementById('tableBody');
            const nameInput = document.getElementById('nameInput');
            const phoneInput = document.getElementById('phoneInput');
            const productInput = document.getElementById('productInput');
            const cmp = document.getElementById('cmp');
            const mn = document.getElementById('mn');
            const fip = document.getElementById('fip');

            const addBtn = document.getElementById('addBtn');
            const updateBtn = document.getElementById('updateBtn');
            const cancelBtn = document.getElementById('cancelBtn');

            function setTodayDate() {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                dateInput.value = `${yyyy}-${mm}-${dd}`;
            }

            function generateId() {
                return Date.now().toString() + Math.random().toString(16).slice(2);
            }

            function renderTable() {
                tableBody.innerHTML = '';
                storedData.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    tr.dataset.id = item.id; // keep id on row
                    tr.innerHTML = `
        <td>${index + 1}</td>
        <td>${item.date}</td>
        <td>${item.name}</td>
        <td>${item.phone}</td>
        <td>${item.product}</td>
        <td>${item.company}</td>
        <td>${item.model}</td>
        <td>${item.desc}</td>
        <td>
          <button class="send-btn small-btn">Send WhatsApp</button><br>
          <button class="delete-btn small-btn">Delete</button>
        </td>
      `;
                    tableBody.appendChild(tr);

                    // row click loads for editing (but not when clicking buttons)
                    tr.addEventListener('click', (e) => {
                        if (e.target.classList.contains('send-btn') || e.target.classList.contains('delete-btn')) return;
                        editId = item.id;
                        srNoInput.value = index + 1;
                        dateInput.value = item.date;
                        nameInput.value = item.name;
                        phoneInput.value = item.phone;
                        productInput.value = item.product;
                        cmp.value = item.company;
                        mn.value = item.model;
                        fip.value = item.desc;

                        addBtn.style.display = 'none';
                        updateBtn.style.display = 'inline-block';
                        cancelBtn.style.display = 'inline-block';
                        nameInput.focus();
                    });

                    // send whatsapp
                    tr.querySelector('.send-btn').addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        const cleanPhone = (item.phone || '').replace(/[^0-9]/g, '');
                        if (!cleanPhone) return alert('Invalid phone number');
                        const message = `Hello ${item.name}\nDate: ${item.date}\nProduct: ${item.product}\nCompany: ${item.company}\nModel: ${item.model}\nDescription: ${item.desc}`;
                        window.open('https://wa.me/' + cleanPhone + '?text=' + encodeURIComponent(message), '_blank');
                    });

                    // delete
                    tr.querySelector('.delete-btn').addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        if (!confirm('Delete entry for ' + item.name + '?')) return;
                        storedData = storedData.filter(d => d.id !== item.id);
                        localStorage.setItem('myData', JSON.stringify(storedData));
                        // if we deleted the currently edited item, clear edit state
                        if (editId === item.id) {
                            editId = null;
                            form.reset();
                            setTodayDate();
                            addBtn.style.display = 'inline-block';
                            updateBtn.style.display = 'none';
                            cancelBtn.style.display = 'none';
                        }
                        renderTable();
                    });
                });

                // sr no for new entry
                if (!editId) srNoInput.value = storedData.length + 1;
            }

            setTodayDate();
            renderTable();

            // Add entry
            addBtn.addEventListener('click', () => {
                const date = dateInput.value;
                const name = nameInput.value.trim();
                const phone = phoneInput.value.trim();
                const product = productInput.value.trim();
                const company = cmp.value.trim();
                const model = mn.value.trim();
                const desc = fip.value.trim();

                if (!date || !name || !phone || !product || !company || !model) {
                    return alert('Please fill all required fields!');
                }

                const obj = { id: generateId(), date, name, phone, product, company, model, desc };
                storedData.push(obj);
                localStorage.setItem('myData', JSON.stringify(storedData));

                form.reset();
                setTodayDate();
                renderTable();
            });

            // Update entry
            updateBtn.addEventListener('click', () => {
                if (!editId) {
                    return alert('No record selected for update!');
                }

                const date = dateInput.value;
                const name = nameInput.value.trim();
                const phone = phoneInput.value.trim();
                const product = productInput.value.trim();
                const company = cmp.value.trim();
                const model = mn.value.trim();
                const desc = fip.value.trim();

                if (!date || !name || !phone || !product || !company || !model) {
                    return alert('Please fill all required fields!');
                }

                // update data
                storedData = storedData.map(item =>
                    item.id === editId ? { id: editId, date, name, phone, product, company, model, desc } : item
                );
                localStorage.setItem('myData', JSON.stringify(storedData));

                // reset UI AFTER update
                editId = null;
                form.reset();
                setTodayDate();
                addBtn.style.display = 'inline-block';
                updateBtn.style.display = 'none';
                cancelBtn.style.display = 'none';
                renderTable();

                alert('✅ Entry updated successfully');
            });

            // Cancel edit
            cancelBtn.addEventListener('click', () => {
                editId = null;
                form.reset();
                setTodayDate();
                addBtn.style.display = 'inline-block';
                updateBtn.style.display = 'none';
                cancelBtn.style.display = 'none';
            });

        });
    </script>

</body>

</html>
